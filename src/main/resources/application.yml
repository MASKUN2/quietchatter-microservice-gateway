server:
  port: 8080

spring:
  application:
    name: microservice-gateway
  config:
    import: "optional:consul:"
  data:
    redis:
      host: ${CONSUL_HOST:localhost}
      port: 6379
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: member-service
              uri: lb://microservice-member
              predicates:
                - Path=/v1/auth/**,/v1/me/**
            - id: book-service
              uri: lb://microservice-book
              predicates:
                - Path=/v1/books/**
            - id: talk-service
              uri: lb://microservice-talk
              predicates:
                - Path=/v1/talks/**,/v1/reactions/**
            - id: customer-service
              uri: lb://microservice-customer
              predicates:
                - Path=/v1/customer/**
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: microservice-gateway
        instance-id: ${spring.application.name}:${server.port}

jwt:
  secret-key: your-very-long-secret-key-at-least-32-chars-long

app:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "https://your-frontend-domain.com"
